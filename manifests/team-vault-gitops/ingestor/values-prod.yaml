app:
  env: "prod"

image:
  tag: "v0.1.0"

container:
  env:
    - name: AWS_REGION
      value: ap-northeast-2
    - name: SQS_S3_EVENTS_URL
      value: "https://sqs.ap-northeast-2.amazonaws.com/ACCOUNT/team-vault-s3-events"
    - name: SQS_WORK_QUEUE_URL
      value: "https://sqs.ap-northeast-2.amazonaws.com/ACCOUNT/team-vault-work-queue"
    - name: S3_BUCKET
      value: team-vault
    - name: DEBOUNCE_SECONDS
      value: "60"
    - name: LOG_LEVEL
      value: INFO
    - name: METRICS_PORT
      value: "9090"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi
