# ------------------------------------------
# ! GENERAL
# ------------------------------------------
app:
  name: &appName "team-vault"
  namespace: "team-vault"
  nameWithRole: &nameWithRole "team-vault-curator"
  env: &env "dev"
nameOverride: *nameWithRole
fullnameOverride: *nameWithRole

image:
  repository: "ACCOUNT.dkr.ecr.ap-northeast-2.amazonaws.com/team-vault/curator"
  pullPolicy: IfNotPresent
  tag: &version ""

commonLabels:
  sg: was-using-db
  team-vault/service: *appName
  team-vault/role: *nameWithRole
  tags.datadoghq.com/service: *nameWithRole

nodeSelector:
  Position: workload

serviceAccount:
  create: false
  name: "sa-team-vault-curator-for-aws"

podSecurityContext:
  runAsUser: 1001
  runAsGroup: 1001
  runAsNonRoot: true
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]

tolerations: []

volumes:
  - name: tmp
    emptyDir: {}

container:
  env:
    - name: AWS_REGION
      value: ap-northeast-2
    - name: S3_BUCKET
      value: team-vault
    - name: OPENSEARCH_ENDPOINT
      value: ""
    - name: VAULT_INDEX
      value: vault
    - name: SLACK_WEBHOOK_URL_REF
      value: "from-secret"
    - name: OUTDATED_DAYS
      value: "30"
    - name: DUPLICATE_THRESHOLD
      value: "0.95"
    - name: LOG_LEVEL
      value: INFO
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: http://datadog-agent.datadog.svc.cluster.local:4317
  volumeMounts:
    - name: tmp
      mountPath: /tmp

resources:
  limits:
    cpu: 1
    memory: 2Gi
  requests:
    cpu: 250m
    memory: 512Mi

affinity: {}

# ------------------------------------------
# ! CRONJOB
# ------------------------------------------
cronjob:
  schedule: "0 0 * * *"   # UTC 00:00 = KST 09:00
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  backoffLimit: 1
  activeDeadlineSeconds: 3600   # 1시간 timeout
  restartPolicy: OnFailure

# ------------------------------------------
# ! SECRETS
# ------------------------------------------
envVariablesFromSecrets:
  - secretKey: ANTHROPIC_API_KEY
    remoteRef:
      key: team-vault/anthropic-api-key
      property: api_key
  - secretKey: SLACK_WEBHOOK_URL
    remoteRef:
      key: team-vault/slack-webhook
      property: url
