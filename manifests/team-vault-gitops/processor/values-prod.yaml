app:
  env: "prod"

image:
  tag: "v0.1.0"

container:
  env:
    - name: AWS_REGION
      value: ap-northeast-2
    - name: SQS_WORK_QUEUE_URL
      value: "https://sqs.ap-northeast-2.amazonaws.com/ACCOUNT/team-vault-work-queue"
    - name: SQS_DLQ_URL
      value: "https://sqs.ap-northeast-2.amazonaws.com/ACCOUNT/team-vault-dlq"
    - name: S3_BUCKET
      value: team-vault
    - name: OPENSEARCH_ENDPOINT
      value: "https://yyy.ap-northeast-2.aoss.amazonaws.com"
    - name: VAULT_INDEX
      value: vault
    - name: ANTHROPIC_MODEL
      value: claude-haiku-4-5-20251001
    - name: ANTHROPIC_USE_BATCH
      value: "true"
    - name: EMBED_PROVIDER
      value: voyage
    - name: EMBED_MODEL
      value: voyage-3
    - name: BATCH_SIZE_MAX
      value: "100"
    - name: LOG_LEVEL
      value: INFO

keda:
  minReplicaCount: 0
  maxReplicaCount: 20

resources:
  limits:
    cpu: 2
    memory: 4Gi
  requests:
    cpu: 1
    memory: 2Gi
