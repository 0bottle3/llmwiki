# ------------------------------------------
# ! GENERAL
# ------------------------------------------
app:
  name: &appName "team-vault"
  namespace: "team-vault"
  nameWithRole: &nameWithRole "team-vault-processor"
  env: &env "dev"
nameOverride: *nameWithRole
fullnameOverride: *nameWithRole

image:
  repository: "ACCOUNT.dkr.ecr.ap-northeast-2.amazonaws.com/team-vault/processor"
  pullPolicy: IfNotPresent
  tag: &version ""

# ------------------------------------------
# ! CRON (배치 변환 — KEDA/SQS 대체)
# ------------------------------------------
# S3 raw/ 를 주기적으로 스캔 → 바뀐 문서만 LLM 가공 → processed/ + 검색 인덱스 upsert.
cron:
  schedule: "0 * * * *"        # 매시 정각 (필요시 "0 18 * * *" = KST 03:00 등으로)
  timeZone: "Etc/UTC"
  concurrencyPolicy: Forbid    # 이전 실행 안 끝났으면 건너뜀
  restartPolicy: OnFailure
  backoffLimit: 1
  startingDeadlineSeconds: 300
  activeDeadlineSeconds: 86400 # Batch API 24h SLA 안에서 완료
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3

commonLabels:
  sg: was-using-db
  team-vault/service: *appName
  team-vault/role: *nameWithRole
  tags.datadoghq.com/service: *nameWithRole

nodeSelector:
  Position: workload

serviceAccount:
  create: false
  name: "sa-team-vault-processor-for-aws"

podSecurityContext:
  runAsUser: 1001
  runAsGroup: 1001
  runAsNonRoot: true
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]

tolerations: []

volumes:
  - name: tmp
    emptyDir: {}
  - name: cache
    emptyDir: {}

# ------------------------------------------
# ! CONTAINER (CronJob — 웹/메트릭 포트 없음, 헬스체크 없음)
# ------------------------------------------
container:
  env:
    - name: AWS_REGION
      value: ap-northeast-2
    - name: S3_BUCKET
      value: team-vault
    - name: OPENSEARCH_ENDPOINT
      value: ""
    - name: VAULT_INDEX
      value: vault
    - name: ANTHROPIC_MODEL
      value: claude-haiku-4-5-20251001
    - name: ANTHROPIC_USE_BATCH
      value: "true"
    - name: EMBED_PROVIDER
      value: voyage
    - name: EMBED_MODEL
      value: voyage-3
    - name: BATCH_SIZE_MAX
      value: "100"
    - name: BATCH_TOKEN_MAX
      value: "10000000"
    - name: LOG_LEVEL
      value: INFO
  volumeMounts:
    - name: tmp
      mountPath: /tmp
    - name: cache
      mountPath: /var/cache/team-vault

# ------------------------------------------
# ! JOB RESOURCES
# ------------------------------------------
terminationGracePeriodSeconds: 600   # 배치 마무리 시간

resources:
  limits:
    cpu: 2
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi

# ------------------------------------------
# ! SECRETS
# ------------------------------------------
envVariablesFromSecrets:
  - secretKey: ANTHROPIC_API_KEY
    remoteRef:
      key: team-vault/anthropic-api-key
      property: api_key
  - secretKey: VOYAGE_API_KEY
    remoteRef:
      key: team-vault/voyage-api-key
      property: api_key
