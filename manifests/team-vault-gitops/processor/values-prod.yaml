app:
  env: "prod"

image:
  tag: "v0.1.0"

cron:
  schedule: "0 * * * *"        # prod: 매시 정각

container:
  env:
    - name: AWS_REGION
      value: ap-northeast-2
    - name: S3_BUCKET
      value: team-vault
    - name: OPENSEARCH_ENDPOINT
      value: "https://yyy.ap-northeast-2.aoss.amazonaws.com"
    - name: VAULT_INDEX
      value: vault
    - name: ANTHROPIC_MODEL
      value: claude-haiku-4-5-20251001
    - name: ANTHROPIC_USE_BATCH
      value: "true"
    - name: EMBED_PROVIDER
      value: voyage
    - name: EMBED_MODEL
      value: voyage-3
    - name: BATCH_SIZE_MAX
      value: "100"
    - name: LOG_LEVEL
      value: INFO

resources:
  limits:
    cpu: 2
    memory: 4Gi
  requests:
    cpu: 1
    memory: 2Gi
