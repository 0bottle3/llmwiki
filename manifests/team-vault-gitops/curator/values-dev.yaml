app:
  env: "dev"

image:
  tag: "dev-latest"

container:
  env:
    - name: AWS_REGION
      value: ap-northeast-2
    - name: S3_BUCKET
      value: team-vault-dev
    - name: OPENSEARCH_ENDPOINT
      value: "https://xxx.ap-northeast-2.aoss.amazonaws.com"
    - name: VAULT_INDEX
      value: vault-dev
    - name: OUTDATED_DAYS
      value: "30"
    - name: DUPLICATE_THRESHOLD
      value: "0.95"
    - name: LOG_LEVEL
      value: DEBUG

cronjob:
  schedule: "0 */6 * * *"   # dev는 6시간마다 (테스트 빈도 ↑)
