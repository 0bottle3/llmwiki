app:
  env: "prod"

image:
  tag: "v0.1.0"

container:
  env:
    - name: AWS_REGION
      value: ap-northeast-2
    - name: S3_BUCKET
      value: team-vault
    - name: OPENSEARCH_ENDPOINT
      value: "https://yyy.ap-northeast-2.aoss.amazonaws.com"
    - name: VAULT_INDEX
      value: vault
    - name: OUTDATED_DAYS
      value: "30"
    - name: DUPLICATE_THRESHOLD
      value: "0.95"
    - name: LOG_LEVEL
      value: INFO

cronjob:
  schedule: "0 0 * * *"   # KST 09:00
