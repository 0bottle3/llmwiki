app:
  env: "dev"

image:
  tag: "dev-latest"

replicaCount: 1
autoscaling:
  minReplicas: 1
  maxReplicas: 2

container:
  env:
    - name: AWS_REGION
      value: ap-northeast-2
    - name: S3_BUCKET
      value: team-vault-dev
    - name: OPENSEARCH_ENDPOINT
      value: "https://xxx.ap-northeast-2.aoss.amazonaws.com"
    - name: VAULT_INDEX
      value: vault-dev
    - name: LOG_LEVEL
      value: DEBUG
    - name: ENABLE_RERANK
      value: "false"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi
