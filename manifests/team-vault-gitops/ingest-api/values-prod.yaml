app:
  env: "prod"

image:
  tag: "v0.1.0"

replicaCount: 3
autoscaling:
  minReplicas: 3
  maxReplicas: 12

ingress:
  annotations:
    alb.ingress.kubernetes.io/security-groups: SG-ELB-INTERNAL-PROD,SG-OPS

resources:
  limits:
    cpu: 1
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi
